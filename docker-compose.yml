services:
  simplzpdf:
    container_name: simplzpdf
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5501:5501"
    restart: unless-stopped
    environment:
      GUNICORN_WORKERS: "3"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5501/health', timeout=3).getcode()==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s